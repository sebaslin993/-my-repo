name: Build and Deploy Quiz 1, Quiz 2, and Quiz 3 WebGL

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build Quiz 1 WebGL
        working-directory: Quiz1/3-HelloWorldOpenGLES-JNI-Android-PC-WebGL-CrossPlatform
        run: bash build_web.sh

      - name: Build Quiz 2 WebGL
        run: bash build_web.sh

      - name: Build Quiz 3 WebGL
        working-directory: Quiz-3-Project
        run: bash build_web.sh

      - name: Prepare Pages directory for all quizzes
        run: |
          mkdir -p pages/Assignment-1-Primitives
          mkdir -p pages/Assignment-2-3DFan
          mkdir -p pages/Assignment-3-HUD
          cp -r Quiz1/3-HelloWorldOpenGLES-JNI-Android-PC-WebGL-CrossPlatform/web/* pages/Assignment-1-Primitives/
          cp -r web/* pages/Assignment-2-3DFan/
          cp -r Quiz-3-Project/web/* pages/Assignment-3-HUD/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
